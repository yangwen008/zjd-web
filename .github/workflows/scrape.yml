name: Daily Scraper

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      recipe_id:
        description: '指定配方ID（留空则运行所有启用的配方）'
        required: false
        default: ''
      scraper:
        description: '指定爬虫脚本（catcher/cdaee/tuliu）'
        required: false
        default: 'catcher'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        env:
          CF_API_URL: ${{ secrets.CF_API_URL }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          RECIPE_ID: ${{ github.event.inputs.recipe_id }}
        run: |
          SCRAPER="${{ github.event.inputs.scraper || 'catcher' }}"
          if [ "$SCRAPER" = "tuliu" ]; then
            node scrapers/tuliu-nongfang.js --pages=5
          elif [ "$SCRAPER" = "cdaee" ]; then
            node scrapers/cdaee.js
          else
            node scrapers/catcher.js
          fi
