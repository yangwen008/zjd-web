name = "zjd-web"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[[d1_databases]]
binding = "DB"
database_name = "zjd-main"
database_id = "6e551489-e5c7-4bf0-a7c4-53cab8dc608c"

[[r2_buckets]]
binding = "R2"
bucket_name = "zjd-assets"

[vars]
SITE_URL = "https://zjd.cn"
# GEMINI_API_KEY — 通过 Cloudflare Dashboard 的 Environment Variables 或 wrangler secret 设置
# ADMIN_PASSWORD — 通过 Cloudflare Dashboard 的 Environment Variables 或 wrangler secret 设置
# SIGNING_SECRET — 通过 Cloudflare Dashboard 的 Environment Variables 或 wrangler secret 设置
